<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trabalhe Conosco</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .form-container {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }

      .form-container h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .form-group input:focus {
        outline: none;
        border-color: #b0d235;
        box-shadow: 0 0 5px rgba(176, 210, 53, 0.5);
      }

      .btn {
        width: 100%;
        padding: 10px;
        background-color: #b0d235;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      .btn:hover {
        background-color: #9eb92e;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h1>Inscrição para Emprego</h1>
      <form action="/submit" method="POST">
        <!-- Campo Nome -->
        <div class="form-group">
          <label for="nome">Nome Completo:</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
        </div>

        <!-- Campo CPF -->
        <div class="form-group">
          <label for="cpf">CPF:</label>
          <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required pattern="\d{11}" title="Digite um CPF válido com 11 dígitos">
        </div>

        <!-- Campo Usuário -->
        <div class="form-group">
          <label for="usuario">Usuário:</label>
          <input type="text" id="usuario" name="usuario" placeholder="Crie um nome de usuário" required>
        </div>

        <!-- Campo Senha -->
        <div class="form-group">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
        </div>

        <!-- Botão de Envio -->
        <button type="submit" class="btn">Enviar</button>
      </form>
    </div>
  </body>
</html>
