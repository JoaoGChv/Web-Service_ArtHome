<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>{% block title %}{% endblock %}</title>
    <style>
      /* Estilo personalizado */
      .hero-section {
        position: relative;
        height: 60vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: #fff;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        text-align: center;
        overflow: hidden;
      }

      .hero-section video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }

      .partners-section img {
        max-height: 80px;
        transition: transform 0.3s ease;
      }

      .partners-section img:hover {
        transform: scale(1.1);
      }

      footer {
        background-color: #b0d235;
        color: #fff;
      }

      footer a {
        text-decoration: none;
        color: inherit;
      }

      footer a:hover {
        text-decoration: underline;
      }

      .container-fluid {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #b0d235;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="{{ url_for('static', filename='img/Art_Home.png') }}" alt="Logo" style="height: 150px;"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <div class="text-center">
              <a href="index" class="btn btn-primary">Página Inicial</a>
            </div>
            <!-- Dropdown para Login e Criar Conta -->
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="authDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Entrar</a>
              <ul class="dropdown-menu" aria-labelledby="authDropdown">
                <li><a class="dropdown-item" href="{{ url_for('login') }}">Login</a></li>
                <li><a class="dropdown-item" href="{{ url_for('signin') }}">Crie uma conta</a></li>
              </ul>
            </li>
            <!-- Novo item de Contato -->
            <li class="nav-item"><a class="nav-link" href="contact">Contato</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section">
      <video autoplay muted loop>
        <source src="{{ url_for('static', filename='Smart_City.mp4') }}" type="video/mp4">
        Seu navegador não suporta vídeos HTML5.
      </video>
      <h1 class="display-4">Welcome to Art Home</h1>
      <div class="d-flex gap-3 mt-4">
      </div>
    </header>

    <!-- Main Content -->
    <div class="container-fluid">
      <img src="{{ url_for('static', filename='img/Art_Home.png') }}" alt="Art Home">
      {% block formulario %}{% endblock %}
    </div>
    <br>

    <!-- Footer -->
    <footer class="text-light py-4">
      <div class="container text-center">
        <p>© 2024 Art Home - All Rights Reserved</p>
        <p> Trabalhe conosco!</p>
        <p>Contact us: <a href="mailto:contact@example.com">contact@example.com</a></p>
        <div class="d-flex justify-content-center gap-3 mt-3">
          <a href="#" class="text-light"><i class="bi bi-facebook"></i></a>
          <a href="#" class="text-light"><i class="bi bi-instagram"></i></a>
          <a href="#" class="text-light"><i class="bi bi-youtube"></i></a>
        </div>
      </div>
    </footer>

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  </body>
</html>
